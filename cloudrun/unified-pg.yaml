apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wydot-unified-pg
  annotations:
    run.googleapis.com/minScale: "1"
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/cloudsql-instances: ${PROJECT_ID}:us-central1:wydot-db-instance
    spec:
      serviceAccountName: cloud-run-sa@${PROJECT_ID}.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 900
      containers:
      - image: ${IMAGE}
        env:
        - name: DOTENV_PATH
          value: /etc/secrets/.env
        # PostgreSQL via Cloud SQL Unix socket proxy
        - name: DATABASE_URL
          value: "postgresql://postgres:WydotDB123%23@/chat_history?host=/cloudsql/${PROJECT_ID}:us-central1:wydot-db-instance"
        # Chainlit paths
        - name: CHAINLIT_FILES_DIRECTORY
          value: /tmp/.files
        - name: CHAINLIT_DB_FILE
          value: /tmp/chainlit.db
        # Model cache
        - name: HF_HOME
          value: /app/model_cache
        # Neo4j Aura database name (must match the instance ID)
        - name: NEO4J_DATABASE_GEMINI
          value: "1c9edfe6"
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        - name: HOME
          value: /tmp
        # SQLite databases
        - name: TELEMETRY_DB_PATH
          value: /tmp/telemetry.sqlite3
        - name: EVAL_DB_PATH
          value: /tmp/evaluation.sqlite3
        - name: CHAT_DB_PATH
          value: /tmp/chat_history.sqlite3
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "2Gi"
            cpu: "2"
        startupProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: dotenv
          mountPath: /etc/secrets
          readOnly: true
      volumes:
      - name: dotenv
        secret:
          secretName: shared-dotenv
          items:
          - key: "4"
            path: .env
  traffic:
  - percent: 100
    latestRevision: true
